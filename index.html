<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Calculator</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}

.calc {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 270px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#display {
    width: 100%;
    height: 50px;
    font-size: 20px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    margin-bottom: 15px;
    background: #eee;
    text-align: right;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    font-size: 16px;
    
}



</style>
</head>

<body>

<div class="calc">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear">C</button>
        <button class="del">DEL</button>
        <button class="operator">%</button>
        <button class="operator">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>0</button>
        <button>00</button>
        <button>.</button>
        <button class="equal">=</button>
    </div>
</div>

<script>
const display = document.getElementById('display');
const buttons = document.querySelectorAll("button");

buttons.forEach(button => {
    button.addEventListener("click", () => {
        const value = button.textContent;

        if (value === "C"){
            display.value = "";
        } 
        else if (value === "DEL"){
            display.value = display.value.slice(0, -1);
        }
        else if (value === "="){
            try {
                display.value = eval(display.value);
            }catch(err){

            }
        }
        else {
            display.value += value;
        }
    });
});
</script>

</body>
</html>

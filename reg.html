<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:green;
            margin: 0px;
              padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        form{
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 20px;
            background-color: white;
            box-shadow: 0px 0px 1px black;
            border-radius: 12px;
            color: black;
            width: 100%;
            max-width: 400px;
        }
         h1 {
display: flex;
justify-content: center;
align-items: center;
        }
        p{
display: flex;
justify-content: center;
align-items: center;
margin-bottom: 50px;
        }
         label{
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        #reg{
            display: none;
        }
    </style>
</head>
<body>
    <form  id="reg">
<h1>Your Event</h1>
<p>Online Registration</p>
<label>Full Name;
     <input type="text" name="" id="name">
</label>
<label>
            Email: 
            <input type="email" id="email">
        </label>
<label>Company(If Applicable);
     <input type="text" name="" id="company">
</label>
<label>Physical Address;
     <input type="text" name="" id="address">
</label>
<label>Date Of Birth;
     <input type="date" name="" id="date">
</label>
 <label>
            Phone Number: 
            <input type="number" id="Phone">
        </label>
        <label for="">
            Password:
            <input type="password" name="" id="password">
        </label>

        <button>signup</button>
        <small id="goTOlogin"> go to login</small>
    </form>


<form id="login">
        <h1>Login</h1>
        <label>
            Email: 
            <input type="email" id="Email">
        </label>
        <label for="">
            Password:
            <input type="password" name="" id="Password">
        </label>

        <button>signup</button>

        <small id="goToRegister"> go to register</small>
    </form>
<script>
     const goTOlogin = document.getElementById('goTOlogin');
const goToRegister = document.getElementById('goToRegister');
const reg = document.getElementById('reg');
const login = document.getElementById('login');

goTOlogin.addEventListener('click', () => {
    reg.style.display = "none";
    login.style.display = "flex";
});

goToRegister.addEventListener('click', () => {
    reg.style.display = "flex";
    login.style.display = "none";
});

const regName = document.getElementById('name');
const regEmail = document.getElementById('email');
const regCompany = document.getElementById('company');

const regDate = document.getElementById('date');
const regPhone = document.getElementById('phone');
const regPassword = document.getElementById('password')


  

</script>


</body>
</html>
